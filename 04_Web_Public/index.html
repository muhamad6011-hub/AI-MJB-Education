<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-MJB-Education | Monitoring</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --accent: #58a6ff;
            --text: #c9d1d9;
            --success: #238636;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid var(--card-bg);
            background: rgba(22, 27, 34, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
        }

        .status-badge {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            background: #21262d;
            border: 1px solid #30363d;
        }

        .dot {
            height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 5px;
        }

        .online { background-color: #3fb950; box-shadow: 0 0 10px #3fb950; }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            width: 90%;
            max-width: 1100px;
            margin-top: 40px;
        }

        .card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #30363d;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .card h3 { margin: 0; font-size: 0.85rem; color: #8b949e; text-transform: uppercase; letter-spacing: 1px; }
        .card p { font-size: 2.2rem; font-weight: bold; margin: 15px 0; color: white; }

        .ai-chat-section {
            width: 90%;
            max-width: 1100px;
            margin: 40px 0;
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid #30363d;
            overflow: hidden;
        }

        #chat-window {
            height: 300px;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: #0d1117;
        }

        .bubble { padding: 10px 15px; border-radius: 15px; max-width: 80%; line-height: 1.5; }
        .ai-bubble { background: #21262d; border: 1px solid var(--accent); align-self: flex-start; }
        .user-bubble { background: var(--accent); color: white; align-self: flex-end; }

        .input-box {
            display: flex;
            padding: 15px;
            gap: 10px;
            border-top: 1px solid #30363d;
        }

        input {
            flex: 1;
            background: #0d1117;
            border: 1px solid #30363d;
            padding: 12px;
            border-radius: 6px;
            color: white;
        }

        button {
            background: var(--success);
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

<header>
    <h1>AI-MJB-EDUCATION</h1>
    <div class="status-badge">
        <span class="dot online" id="status-dot"></span> 
        STATUS: <span id="status-text" style="color: #3fb950;">ACTIVE</span>
    </div>
</header>

<div class="dashboard">
    <div class="card">
        <h3>Processor Load</h3>
        <p id="cpu-val">--%</p>
    </div>
    <div class="card">
        <h3>Memory Usage</h3>
        <p id="ram-val">--%</p>
    </div>
    <div class="card">
        <h3>Storage Health</h3>
        <p id="disk-val">--%</p>
    </div>
</div>

<div class="ai-chat-section">
    <div id="chat-window">
        <div class="bubble ai-bubble">Halo! Saya AI-MJB-Edu. Saya sedang memantau sistem Anda secara real-time. Ada yang ingin ditanyakan?</div>
    </div>
    <div class="input-box">
        <input type="text" id="user-input" placeholder="Tanya tentang performa PC...">
        <button onclick="sendChat()">TANYA</button>
    </div>
</div>

<script>
    // Fungsi untuk mengambil data dari JSON yang dipush PowerShell
    async function refreshStats() {
        try {
            // Path menuju file yang diupdate PowerShell
            const res = await fetch('data/status_live.json?t=' + Date.now());
            const data = await res.json();
            
            document.getElementById('cpu-val').innerText = data.CPU_Usage + '%';
            document.getElementById('ram-val').innerText = data.RAM_Usage + '%';
            document.getElementById('disk-val').innerText = data.Disk_Usage + '%';
            
            // Logika Status Online
            document.getElementById('status-text').innerText = "ACTIVE";
            document.getElementById('status-dot').className = "dot online";
        } catch (e) {
            console.log("Menunggu data...");
            document.getElementById('status-text').innerText = "WAITING DATA";
            document.getElementById('status-dot').className = "dot";
        }
    }

    function sendChat() {
        const input = document.getElementById('user-input');
        const window = document.getElementById('chat-window');
        if(!input.value) return;

        window.innerHTML += `<div class="bubble user-bubble">${input.value}</div>`;
        
        // Simulasi Respon AI (Nanti bisa dihubungkan ke Cloudflare AI)
        setTimeout(() => {
            window.innerHTML += `<div class="bubble ai-bubble">Berdasarkan data terbaru, sistem Anda berjalan normal. Data sedang saya kumpulkan untuk Big Data MJB-Edu.</div>`;
            window.scrollTop = window.scrollHeight;
        }, 1000);

        input.value = "";
    }

    // Update setiap 10 detik
    setInterval(refreshStats, 10000);
    refreshStats();
</script>

</body>
</html>

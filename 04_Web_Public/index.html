<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI MJB-EDU Dashboard</title>
    <style>
        body { background: #0a0a0a; color: #00f3ff; font-family: 'Courier New', monospace; padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { border: 1px solid #00f3ff; padding: 20px; border-radius: 10px; background: rgba(0, 243, 255, 0.05); box-shadow: 0 0 15px rgba(0, 243, 255, 0.2); }
        h1, h2 { text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid #00f3ff; padding-bottom: 10px; }
        .news-item { border-left: 3px solid #00f3ff; padding-left: 15px; margin-bottom: 20px; transition: 0.3s; }
        .news-item:hover { background: rgba(0, 243, 255, 0.1); cursor: pointer; }
        a { color: #fff; text-decoration: none; font-weight: bold; }
        .status-ok { color: #00ff00; }
    </style>
</head>
<body>

    <h1>🚀 AI MJB-EDU CENTRAL INTELLIGENCE</h1>

    <div class="grid">
        <div class="card">
            <h2>💻 System Monitor</h2>
            <div id="system-stats">Memuat data sensor...</div>
        </div>

        <div class="card">
            <h2>🌐 Global AI News</h2>
            <div id="news-feed">Menghubungkan ke satelit berita...</div>
        </div>
    </div>

    <script>
        // 1. MENGAMBIL DATA SISTEM PC
        fetch('data/status_live.json')
            .then(res => res.json())
            .then(data => {
                document.getElementById('system-stats').innerHTML = `
                    <p>Waktu Scan: ${data.Timestamp}</p>
                    <p>CPU Usage: <strong>${data.CPU_Usage}%</strong></p>
                    <p>RAM Free: <strong>${data.RAM_Free_GB} GB</strong></p>
                    <p>Status: <span class="status-ok">ACTIVE</span></p>
                `;
            });

        // 2. MENGAMBIL DATA BERITA GLOBAL
        fetch('data/latest_news.json')
            .then(res => res.json())
            .then(data => {
                const feed = document.getElementById('news-feed');
                feed.innerHTML = '';
                data.Articles.forEach(item => {
                    feed.innerHTML += `
                        <div class="news-item">
                            <a href="${item.url}" target="_blank">${item.title}</a>
                            <div style="font-size: 0.8em; color: #888; margin-top:5px;">
                                Sumber: ${item.source.name} | ${new Date(item.publishedAt).toLocaleDateString()}
                            </div>
                        </div>
                    `;
                });
            })
            .catch(err => {
                document.getElementById('news-feed').innerHTML = "Belum ada berita yang ditambang.";
            });
    </script>
</body>
</html>

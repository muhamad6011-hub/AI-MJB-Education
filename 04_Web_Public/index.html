<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MJB-Edu AI Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: #e5e7eb; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .sidebar-item:hover { background: rgba(0, 243, 255, 0.1); color: #00f3ff; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        .ai-message { border-left: 4px solid #06b6d4; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <div class="w-64 glass flex flex-col p-4">
        <h1 class="text-xl font-bold mb-8 text-cyan-400">MJB-EDU <span class="text-xs text-white block">Intelligence System</span></h1>
        
        <nav class="flex-1">
            <button onclick="showPage('home')" class="sidebar-item w-full text-left p-3 rounded-lg mb-2 transition">🏠 Dashboard</button>
            <button onclick="showPage('chat')" class="sidebar-item w-full text-left p-3 rounded-lg mb-2 transition">💬 AI Chat</button>
            <button class="sidebar-item w-full text-left p-3 rounded-lg mb-2 opacity-50 cursor-not-allowed">📊 Big Data (Soon)</button>
        </nav>

        <div class="text-xs text-gray-500 border-t border-gray-800 pt-4">
            System Status: <span class="text-green-500">Online</span>
        </div>
    </div>

    <div class="flex-1 flex flex-col overflow-y-auto">
        
        <div id="page-home" class="p-8">
            <h2 class="text-3xl font-bold mb-6">Welcome Back, Master.</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="glass p-6 rounded-2xl">
                    <h3 class="text-cyan-400 font-bold mb-4">PC STATUS</h3>
                    <div id="status-content" class="space-y-2 text-sm text-gray-300">Memuat sensor...</div>
                </div>
                <div class="glass p-6 rounded-2xl">
                    <h3 class="text-cyan-400 font-bold mb-4">WORLD NEWS</h3>
                    <div id="news-content" class="space-y-4 text-xs h-64 overflow-y-auto">Memuat berita...</div>
                </div>
            </div>
        </div>

        <div id="page-chat" class="hidden flex flex-col h-full">
            <div id="chat-box" class="flex-1 overflow-y-auto p-8 space-y-6">
                <div class="max-w-3xl mx-auto glass p-4 rounded-xl text-gray-400">
                    Halo! Saya AI MJB-Edu. Saya sudah membaca buku Anda. Silakan tanya apa saja terkait isi buku tersebut!
                </div>
            </div>
            
            <div class="p-8 border-t border-gray-800 bg-black/50">
                <div class="max-w-3xl mx-auto flex gap-4">
                    <input id="chat-input" type="text" placeholder="Tanya sesuatu dari buku..." class="flex-1 bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 focus:outline-none focus:border-cyan-500">
                    <button onclick="sendMessage()" class="bg-cyan-600 hover:bg-cyan-500 text-white px-6 py-3 rounded-xl transition">Kirim</button>
                </div>
            </div>
        </div>

    </div>

    <script>
    // Konfigurasi Gemini (Nanti kita pindahkan ke Cloudflare Worker untuk keamanan penuh)
    const GEMINI_API_KEY = "AIzaSyCJiqxu1mps56EP9T5MukN6V_1fewY1u_Q"; 

    function showPage(page) {
        document.getElementById('page-home').classList.add('hidden');
        document.getElementById('page-chat').classList.add('hidden');
        document.getElementById('page-' + page).classList.remove('hidden');
    }

    // Fetch Status PC
    fetch('data/status_live.json').then(r => r.json()).then(data => {
        document.getElementById('status-content').innerHTML = `
            <p>CPU: ${data.CPU_Usage}%</p>
            <p>RAM: ${data.RAM_Free_GB} GB Free</p>
            <p class="text-xs text-gray-500 text-cyan-800">Sync: ${data.Timestamp}</p>
        `;
    });

    // Fetch Berita
    fetch('data/latest_news.json').then(r => r.json()).then(data => {
        const container = document.getElementById('news-content');
        container.innerHTML = data.Articles.map(a => `
            <div class="border-b border-gray-800 pb-2">
                <a href="${a.url}" target="_blank" class="hover:text-cyan-400">${a.title}</a>
            </div>
        `).join('');
    });

    // FUNGSI CHAT CERDAS (INTEGRASI GEMINI + BUKU)
    async function sendMessage() {
        const input = document.getElementById('chat-input');
        const box = document.getElementById('chat-box');
        const userMsg = input.value.trim();
        
        if(!userMsg) return;

        // 1. Tampilkan Pesan User
        box.innerHTML += `<div class="max-w-3xl mx-auto text-right mb-4"><span class="bg-cyan-900/50 p-3 rounded-xl inline-block"><b>Anda:</b> ${userMsg}</span></div>`;
        input.value = "";
        box.scrollTop = box.scrollHeight;

        try {
            // 2. Ambil Data Buku sebagai konteks
            const res = await fetch('data/latest_book.json');
            const book = await res.json();
            
            // Cari potongan teks yang relevan (Simple search)
            const index = book.Content.toLowerCase().indexOf(userMsg.toLowerCase());
            let context = book.Content.substring(0, 2000); // Ambil 2000 karakter pertama sebagai dasar jika tidak ketemu spesifik
            
            if (index !== -1) {
                context = book.Content.substring(Math.max(0, index - 500), index + 1500);
            }

            // 3. Panggil API Gemini
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [{
                            text: `Kamu adalah AI MJB-Edu. Gunakan konteks buku berikut untuk menjawab pertanyaan user. 
                            Jika tidak ada di buku, jawablah berdasarkan pengetahuanmu tapi beri tahu jika itu di luar buku.
                            
                            KONTEKS BUKU: ${context}
                            
                            PERTANYAAN: ${userMsg}`
                        }]
                    }]
                })
            });

            const result = await response.json();
            const aiReply = result.candidates[0].content.parts[0].text;

            // 4. Tampilkan Jawaban AI
            box.innerHTML += `
                <div class="max-w-3xl mx-auto text-left mb-4">
                    <div class="glass p-5 rounded-xl ai-message bg-cyan-950/20">
                        🤖 <b>AI MJB-Edu:</b><br><br>${aiReply.replace(/\n/g, '<br>')}
                    </div>
                </div>`;
            box.scrollTop = box.scrollHeight;

        } catch (err) {
            box.innerHTML += `<div class="text-red-500 text-center text-xs">AI sedang offline. Pastikan API Key benar.</div>`;
        }
    }
    </script>
</body>
</html>
